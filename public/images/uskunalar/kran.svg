  <linearGradient id="kr_kabin" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#0c1828"/>
    <stop offset="50%"  stop-color="#1a2c40"/>
    <stop offset="100%" stop-color="#0c1828"/>
  </linearGradient>
  <filter id="kr_blur3"><feGaussianBlur stdDeviation="3"/></filter>
  <filter id="kr_blur6"><feGaussianBlur stdDeviation="6"/></filter>
  <filter id="kr_glow4"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

