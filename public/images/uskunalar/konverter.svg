<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640">
<defs>
  <linearGradient id="k_steel" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#08101e"/>
    <stop offset="20%"  stop-color="#162535"/>
    <stop offset="42%"  stop-color="#1e3348"/>
    <stop offset="62%"  stop-color="#264060"/>
    <stop offset="82%"  stop-color="#162535"/>
    <stop offset="100%" stop-color="#08101e"/>
  </linearGradient>
  <linearGradient id="k_lance" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#0a1828"/>
    <stop offset="35%"  stop-color="#243a50"/>
    <stop offset="65%"  stop-color="#2e4860"/>
    <stop offset="100%" stop-color="#0a1828"/>
  </linearGradient>
  <linearGradient id="k_trunnion" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#060c18"/>
    <stop offset="40%"  stop-color="#18263a"/>
    <stop offset="60%"  stop-color="#202e44"/>
    <stop offset="100%" stop-color="#060c18"/>
  </linearGradient>
  <linearGradient id="k_gorn" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#100500"/>
    <stop offset="35%"  stop-color="#3a1200"/>
    <stop offset="65%"  stop-color="#501800"/>
    <stop offset="100%" stop-color="#100500"/>
  </linearGradient>
  <radialGradient id="k_metal" cx="50%" cy="55%" r="55%">
    <stop offset="0%"   stop-color="#ffee00"/>
    <stop offset="30%"  stop-color="#ff8800"/>
    <stop offset="65%"  stop-color="#cc3300"/>
    <stop offset="100%" stop-color="#660000"/>
  </radialGradient>
  <radialGradient id="k_lanceTip" cx="50%" cy="100%" r="70%">
    <stop offset="0%"   stop-color="#00ffcc" stop-opacity="1"/>
    <stop offset="50%"  stop-color="#00cc88" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#008844" stop-opacity="0"/>
  </radialGradient>
  <filter id="k_glow5"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="k_glow10"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="k_blur5"><feGaussianBlur stdDeviation="5"/></filter>
  <filter id="k_blur8"><feGaussianBlur stdDeviation="8"/></filter>
  <pattern id="k_brick" x="0" y="0" width="14" height="9" patternUnits="userSpaceOnUse">
    <rect x="0.5" y="0.5" width="13" height="8" fill="none" stroke="#102030" stroke-width="0.4" opacity="0.5"/>
  </pattern>
</defs>

<rect width="480" height="640" fill="#060910"/>

