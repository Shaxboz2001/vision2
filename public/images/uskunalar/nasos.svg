  <linearGradient id="n_truba_h" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#081828"/>
    <stop offset="35%"  stop-color="#183848"/>
    <stop offset="65%"  stop-color="#204858"/>
    <stop offset="100%" stop-color="#081828"/>
  </linearGradient>
  <filter id="n_glow5"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="n_blur5"><feGaussianBlur stdDeviation="5"/></filter>
  <filter id="n_blur8"><feGaussianBlur stdDeviation="8"/></filter>
