<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640">
<defs>
  <linearGradient id="e_shell" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#070810"/>
    <stop offset="20%"  stop-color="#101028"/>
    <stop offset="45%"  stop-color="#181838"/>
    <stop offset="65%"  stop-color="#202040"/>
    <stop offset="82%"  stop-color="#101028"/>
    <stop offset="100%" stop-color="#070810"/>
  </linearGradient>
  <linearGradient id="e_electrode" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#0c0c1e"/>
    <stop offset="35%"  stop-color="#1e1e38"/>
    <stop offset="65%"  stop-color="#282848"/>
    <stop offset="100%" stop-color="#0c0c1e"/>
  </linearGradient>
  <linearGradient id="e_svod_top" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#1e1e30"/>
    <stop offset="100%" stop-color="#0e0e20"/>
  </linearGradient>
  <radialGradient id="e_ark" cx="50%" cy="50%" r="55%">
    <stop offset="0%"   stop-color="#dd99ff" stop-opacity="1"/>
    <stop offset="35%"  stop-color="#9944ee" stop-opacity="0.7"/>
    <stop offset="70%"  stop-color="#6622cc" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#3300aa" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="e_metal" cx="50%" cy="58%" r="55%">
    <stop offset="0%"   stop-color="#ffee88"/>
    <stop offset="28%"  stop-color="#ff9900"/>
    <stop offset="65%"  stop-color="#cc3300"/>
    <stop offset="100%" stop-color="#660000"/>
  </radialGradient>
  <linearGradient id="e_trans" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#080818"/>
    <stop offset="40%"  stop-color="#141430"/>
    <stop offset="60%"  stop-color="#1c1c3c"/>
    <stop offset="100%" stop-color="#080818"/>
  </linearGradient>
  <filter id="e_glow6"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="e_glow12"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="e_blur5"><feGaussianBlur stdDeviation="5"/></filter>
  <filter id="e_blur10"><feGaussianBlur stdDeviation="10"/></filter>
  <pattern id="e_brick" x="0" y="0" width="14" height="9" patternUnits="userSpaceOnUse">
    <rect x="0.5" y="0.5" width="13" height="8" fill="none" stroke="#141428" stroke-width="0.4" opacity="0.6"/>
  </pattern>
</defs>

<rect width="480" height="640" fill="#040508"/>

